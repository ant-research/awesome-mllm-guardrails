<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">LLM and MLLM guardrails landscape</title>
  <desc id="desc">A visual map organizing guardrail resources by inputs, risks, guard methods, outputs, and evaluation loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="52%" stop-color="#f3f8f6"/>
      <stop offset="100%" stop-color="#fffaf2"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#0e8f75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18324a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5c6b7a"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14213d; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #506174; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152238; }
      .body { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536275; }
      .small { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3f5064; }
      .card { fill: #ffffff; stroke: #d8e2ec; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .chip { fill: #eef6ff; stroke: #c9def7; stroke-width: 1; rx: 13; }
      .chip2 { fill: #effaf5; stroke: #c7eadb; stroke-width: 1; rx: 13; }
      .chip3 { fill: #fff4e2; stroke: #f0d8ab; stroke-width: 1; rx: 13; }
      .line { stroke: #687789; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #9a6b16; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="56" y="60" class="title">Awesome MLLM / LLM Guardrails</text>
  <text x="58" y="88" class="subtitle">A map of datasets, guard models, attacks, evaluation suites, and deployment tools for text, image, video, and multi-turn AI safety.</text>

  <rect x="58" y="134" width="185" height="228" class="card"/>
  <text x="84" y="174" class="label">Inputs</text>
  <rect x="84" y="196" width="112" height="28" class="chip"/>
  <text x="104" y="215" class="small">Text</text>
  <rect x="84" y="236" width="112" height="28" class="chip"/>
  <text x="103" y="255" class="small">Image</text>
  <rect x="84" y="276" width="112" height="28" class="chip"/>
  <text x="103" y="295" class="small">Video</text>
  <rect x="84" y="316" width="112" height="28" class="chip"/>
  <text x="100" y="335" class="small">Dialogue</text>

  <rect x="300" y="112" width="210" height="270" class="card"/>
  <text x="328" y="152" class="label">Risk Taxonomies</text>
  <text x="328" y="183" class="body">Harmful requests</text>
  <text x="328" y="208" class="body">Unsafe responses</text>
  <text x="328" y="233" class="body">Jailbreak / injection</text>
  <text x="328" y="258" class="body">Refusal and over-refusal</text>
  <text x="328" y="283" class="body">Cross-modal risk</text>
  <text x="328" y="308" class="body">Agent/tool risk</text>
  <rect x="328" y="329" width="130" height="28" class="chip3"/>
  <text x="347" y="348" class="small">Severity levels</text>

  <rect x="570" y="82" width="260" height="330" rx="24" fill="url(#guard)" filter="url(#shadow)"/>
  <text x="612" y="135" style="font: 800 25px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff;">Guard Layer</text>
  <text x="612" y="168" style="font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e7fbff;">Models, policies, rules, and tools</text>
  <rect x="612" y="202" width="178" height="32" rx="16" fill="#ffffff" opacity="0.95"/>
  <text x="637" y="223" class="small">Static classifiers</text>
  <rect x="612" y="248" width="178" height="32" rx="16" fill="#ffffff" opacity="0.95"/>
  <text x="637" y="269" class="small">Reasoning guards</text>
  <rect x="612" y="294" width="178" height="32" rx="16" fill="#ffffff" opacity="0.95"/>
  <text x="637" y="315" class="small">Policy-following VLMs</text>
  <rect x="612" y="340" width="178" height="32" rx="16" fill="#ffffff" opacity="0.95"/>
  <text x="637" y="361" class="small">Runtime frameworks</text>

  <rect x="890" y="134" width="220" height="228" class="card"/>
  <text x="920" y="174" class="label">Decisions</text>
  <rect x="920" y="198" width="142" height="28" class="chip2"/>
  <text x="942" y="217" class="small">Allow</text>
  <rect x="920" y="238" width="142" height="28" class="chip3"/>
  <text x="942" y="257" class="small">Warn / Rewrite</text>
  <rect x="920" y="278" width="142" height="28" class="chip3"/>
  <text x="942" y="297" class="small">Refuse / Block</text>
  <rect x="920" y="318" width="142" height="28" class="chip"/>
  <text x="942" y="337" class="small">Log / Escalate</text>

  <path d="M244 248 C270 248 272 248 300 248" class="line"/>
  <path d="M510 248 C536 248 540 248 570 248" class="line"/>
  <path d="M830 248 C858 248 862 248 890 248" class="line"/>

  <rect x="180" y="420" width="840" height="54" rx="20" fill="#ffffff" stroke="#d8e2ec" filter="url(#shadow)"/>
  <text x="220" y="452" class="body">Evaluation loop: benchmarks and red-teaming continuously update guard models, policy rules, and deployment thresholds.</text>
  <path d="M980 420 C1070 378 1088 194 1110 178" class="loop"/>
  <path d="M220 420 C116 378 96 246 112 226" class="loop"/>
</svg>
